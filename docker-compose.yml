services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.7.2
    ports:
      - "8123:8123"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ha-config:/config
      - ./custom_components/kubernetes:/config/custom_components/kubernetes:ro
    restart: unless-stopped

volumes:
  ha-config:
